name: Deploy to EC2

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t yumikokawaii/akashic:${{ github.ref_name }} .

      - name: Save image to tar
        run: docker save yumikokawaii/akashic:${{ github.ref_name }} -o akashic.tar

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: akashic.tar
          target: /tmp/

      - name: Load image and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker load -i /tmp/akashic.tar
            docker stop akashic || true
            docker rm akashic || true
            docker run -d \
              --name akashic \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file /app/akashic.env \
              yumikokawaii/akashic:${{ github.ref_name }}
            rm /tmp/akashic.tar
