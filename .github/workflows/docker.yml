name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t yumikokawaii/akashic:latest .

      - name: Save image to tar
        run: |
          docker save yumikokawaii/akashic:latest -o akashic.tar
          chmod 644 akashic.tar

      - name: Copy image and compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "akashic.tar,docker-compose.yml"
          target: /tmp/

      - name: Load image and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker load -i /tmp/akashic.tar
            rm -f /tmp/akashic.tar

            mkdir -p ~/akashic
            mv /tmp/docker-compose.yml ~/akashic/docker-compose.yml

            cd ~/akashic
            docker compose up -d

            docker image prune -f
