name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t yumikokawaii/akashic:${{ github.ref_name }} .

      - name: Save image to tar
        run: |
          docker save yumikokawaii/akashic:${{ github.ref_name }} -o akashic.tar
          chmod 644 akashic.tar

      - name: Copy image and deploy script to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "akashic.tar,deploy.sh"
          target: /tmp/

      - name: Load image and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            bash /tmp/deploy.sh
