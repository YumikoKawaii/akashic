version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-akashic}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-akashic}
      POSTGRES_DB: ${DB_NAME:-akashic}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-akashic}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
