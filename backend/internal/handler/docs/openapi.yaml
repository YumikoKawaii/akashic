openapi: 3.0.3
info:
  title: Akashic API
  description: |
    Personal test/quiz management system. All endpoints (except auth) require
    a valid `auth_token` cookie issued by the Google OAuth flow.
  version: "1.0.0"

servers:
  - url: /api/v1
    description: Local server

tags:
  - name: auth
  - name: banks
  - name: members
  - name: categories
  - name: passages
  - name: question-groups
  - name: questions
  - name: tests
  - name: attempts

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token

  security:
    - cookieAuth: []

  schemas:
    # ── Value objects ────────────────────────────────────────────────────────────

    TestConfig:
      type: object
      properties:
        easy_count:   { type: integer, example: 10 }
        medium_count: { type: integer, example: 10 }
        hard_count:   { type: integer, example: 10 }
        category_ids:
          type: array
          items: { type: integer }
        types:
          type: array
          items:
            type: string
            enum: [mcq, tf_ng, yn_ng, matching_headings, matching_information,
                   matching_features, sentence_completion, form_completion, short_answer]
        tags:
          type: array
          items: { type: string }

    MCQOption:
      type: object
      required: [key, text]
      properties:
        key:  { type: string, example: A }
        text: { type: string, example: "Paris" }

    OptionItem:
      type: object
      required: [key, text]
      properties:
        key:  { type: string }
        text: { type: string }

    SectionItem:
      type: object
      required: [key, label]
      properties:
        key:   { type: string }
        label: { type: string }

    GroupContext:
      type: object
      description: Type-specific shared data for a QuestionGroup. Fields vary by group type.
      properties:
        sections:   { type: array, items: { $ref: "#/components/schemas/SectionItem" } }
        headings:   { type: array, items: { $ref: "#/components/schemas/OptionItem" } }
        paragraphs: { type: array, items: { $ref: "#/components/schemas/OptionItem" } }
        options:    { type: array, items: { $ref: "#/components/schemas/OptionItem" } }
        word_limit: { type: integer }
        word_bank:  { type: array, items: { type: string } }
        form_type:  { type: string }
        title:      { type: string }
        template:   { type: string }

    # ── Entities ─────────────────────────────────────────────────────────────────

    User:
      type: object
      properties:
        id:         { type: integer }
        email:      { type: string }
        name:       { type: string }
        avatar_url: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Bank:
      type: object
      properties:
        id:             { type: integer }
        name:           { type: string }
        description:    { type: string }
        owner_id:       { type: integer }
        default_config: { $ref: "#/components/schemas/TestConfig" }
        created_at:     { type: string, format: date-time }
        updated_at:     { type: string, format: date-time }

    BankWithRole:
      allOf:
        - $ref: "#/components/schemas/Bank"
        - type: object
          properties:
            my_role:
              type: string
              enum: [owner, editor, viewer]

    BankMember:
      type: object
      properties:
        id:         { type: integer }
        bank_id:    { type: integer }
        user_id:    { type: integer }
        role:       { type: string, enum: [owner, editor, viewer] }
        user:       { $ref: "#/components/schemas/User" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Category:
      type: object
      properties:
        id:          { type: integer }
        bank_id:     { type: integer }
        name:        { type: string }
        description: { type: string }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    Passage:
      type: object
      properties:
        id:          { type: integer }
        bank_id:     { type: integer }
        category_id: { type: integer }
        category:    { $ref: "#/components/schemas/Category" }
        title:       { type: string }
        body:        { type: string }
        difficulty:  { type: string, enum: [easy, medium, hard] }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    QuestionGroup:
      type: object
      properties:
        id:          { type: integer }
        bank_id:     { type: integer }
        category_id: { type: integer }
        passage_id:  { type: integer }
        type:
          type: string
          enum: [matching_headings, matching_information, matching_features,
                 sentence_completion, form_completion, short_answer]
        difficulty:  { type: string, enum: [easy, medium, hard] }
        context:     { $ref: "#/components/schemas/GroupContext" }
        questions:
          type: array
          items: { $ref: "#/components/schemas/Question" }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    QQuestionItem:
      type: object
      properties:
        question_id: { type: integer }
        content:     { type: string }
        answer:      { type: string }

    QMultipleChoice:
      type: object
      properties:
        question_id: { type: integer }
        content:     { type: string }
        options:
          type: array
          items: { $ref: "#/components/schemas/MCQOption" }
        answers:
          type: array
          items: { type: string }
          description: Correct option keys, e.g. ["A"] or ["A","C"]

    Question:
      type: object
      properties:
        id:          { type: integer }
        bank_id:     { type: integer }
        category_id: { type: integer }
        group_id:    { type: integer }
        type:
          type: string
          enum: [mcq, tf_ng, yn_ng, matching_headings, matching_information,
                 matching_features, sentence_completion, form_completion, short_answer]
        difficulty:  { type: string, enum: [easy, medium, hard] }
        tags:
          type: array
          items: { type: string }
        position:    { type: integer }
        item:        { $ref: "#/components/schemas/QQuestionItem" }
        choice:      { $ref: "#/components/schemas/QMultipleChoice" }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    Test:
      type: object
      properties:
        id:          { type: integer }
        bank_id:     { type: integer }
        name:        { type: string }
        description: { type: string }
        config:      { $ref: "#/components/schemas/TestConfig" }
        questions:
          type: array
          items:
            type: object
            properties:
              test_id:     { type: integer }
              question_id: { type: integer }
              position:    { type: integer }
              question:    { $ref: "#/components/schemas/Question" }
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    TestAttempt:
      type: object
      properties:
        id:          { type: integer }
        test_id:     { type: integer }
        test:        { $ref: "#/components/schemas/Test" }
        answers:
          type: object
          additionalProperties: { type: string }
          description: Map of question_id (string) → submitted answer
        score:       { type: integer }
        total:       { type: integer }
        started_at:  { type: string, format: date-time }
        completed_at: { type: string, format: date-time }

    IngestResult:
      type: object
      properties:
        created: { type: integer }
        failed:  { type: integer }
        errors:
          type: array
          items:
            type: object
            properties:
              row:     { type: integer }
              message: { type: string }

    Error:
      type: object
      properties:
        error: { type: string }

security:
  - cookieAuth: []

paths:
  # ── Auth ──────────────────────────────────────────────────────────────────────

  /auth/google:
    get:
      tags: [auth]
      summary: Initiate Google OAuth flow
      security: []
      responses:
        "307": { description: Redirect to Google consent screen }

  /auth/google/callback:
    get:
      tags: [auth]
      summary: Google OAuth callback — sets auth_token cookie
      security: []
      parameters:
        - name: code  ; in: query ; schema: { type: string }
        - name: state ; in: query ; schema: { type: string }
      responses:
        "307": { description: Redirect to frontend after login }
        "400":
          description: Invalid state or missing code
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/me:
    get:
      tags: [auth]
      summary: Return current user from JWT cookie
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/User" }
        "401": { description: Unauthenticated }

  /auth/logout:
    post:
      tags: [auth]
      summary: Clear auth_token cookie
      responses:
        "204": { description: Logged out }

  # ── Banks ─────────────────────────────────────────────────────────────────────

  /banks:
    get:
      tags: [banks]
      summary: List banks accessible to the current user
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/BankWithRole" }
    post:
      tags: [banks]
      summary: Create a new bank
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:           { type: string, example: "English IELTS" }
                description:    { type: string }
                default_config: { $ref: "#/components/schemas/TestConfig" }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/BankWithRole" }

  /banks/{bankId}:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [banks]
      summary: Get a single bank
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/BankWithRole" }
        "403": { description: Forbidden }
        "404": { description: Not found }
    put:
      tags: [banks]
      summary: Update bank name / description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:        { type: string }
                description: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/BankWithRole" }
    delete:
      tags: [banks]
      summary: Soft-delete a bank (owner only)
      responses:
        "204": { description: Deleted }

  /banks/{bankId}/restore:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
    put:
      tags: [banks]
      summary: Restore a soft-deleted bank
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/BankWithRole" }

  /banks/{bankId}/default-config:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
    put:
      tags: [banks]
      summary: Replace the bank's default TestConfig
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TestConfig" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/BankWithRole" }

  # ── Members ───────────────────────────────────────────────────────────────────

  /banks/{bankId}/members:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [members]
      summary: List bank members
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/BankMember" }
    post:
      tags: [members]
      summary: Add a member by email (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role:  { type: string, enum: [editor, viewer] }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/BankMember" }
        "404": { description: User not found (must sign in once first) }

  /banks/{bankId}/members/{userId}:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: userId ; in: path ; required: true ; schema: { type: integer }
    delete:
      tags: [members]
      summary: Remove a member (owner only)
      responses:
        "204": { description: Removed }

  /banks/{bankId}/members/{userId}/role:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: userId ; in: path ; required: true ; schema: { type: integer }
    put:
      tags: [members]
      summary: Change a member's role (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [editor, viewer] }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/BankMember" }

  # ── Categories ────────────────────────────────────────────────────────────────

  /banks/{bankId}/categories:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [categories]
      summary: List categories in a bank
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Category" }
    post:
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string }
                description: { type: string }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Category" }

  /banks/{bankId}/categories/{id}:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: id     ; in: path ; required: true ; schema: { type: integer }
    put:
      tags: [categories]
      summary: Update a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:        { type: string }
                description: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Category" }
    delete:
      tags: [categories]
      summary: Soft-delete a category
      responses:
        "204": { description: Deleted }

  /banks/{bankId}/categories/{id}/restore:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: id     ; in: path ; required: true ; schema: { type: integer }
    put:
      tags: [categories]
      summary: Restore a soft-deleted category
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Category" }

  # ── Passages ──────────────────────────────────────────────────────────────────

  /banks/{bankId}/passages:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [passages]
      summary: List passages in a bank
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Passage" }
    post:
      tags: [passages]
      summary: Create a passage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_id, title, difficulty]
              properties:
                category_id: { type: integer }
                title:       { type: string }
                body:        { type: string }
                difficulty:  { type: string, enum: [easy, medium, hard] }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Passage" }

  /banks/{bankId}/passages/{id}:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: id     ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [passages]
      summary: Get a single passage
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Passage" }
    put:
      tags: [passages]
      summary: Update a passage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category_id: { type: integer }
                title:       { type: string }
                body:        { type: string }
                difficulty:  { type: string, enum: [easy, medium, hard] }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Passage" }
    delete:
      tags: [passages]
      summary: Soft-delete a passage
      responses:
        "204": { description: Deleted }

  /banks/{bankId}/passages/{id}/restore:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: id     ; in: path ; required: true ; schema: { type: integer }
    put:
      tags: [passages]
      summary: Restore a soft-deleted passage
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Passage" }

  # ── Question Groups ───────────────────────────────────────────────────────────

  /banks/{bankId}/question-groups:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [question-groups]
      summary: List question groups in a bank
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/QuestionGroup" }
    post:
      tags: [question-groups]
      summary: Create a question group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_id, type, difficulty]
              properties:
                category_id: { type: integer }
                passage_id:  { type: integer }
                type:
                  type: string
                  enum: [matching_headings, matching_information, matching_features,
                         sentence_completion, form_completion, short_answer]
                difficulty:  { type: string, enum: [easy, medium, hard] }
                context:     { $ref: "#/components/schemas/GroupContext" }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/QuestionGroup" }

  /banks/{bankId}/question-groups/{id}:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: id     ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [question-groups]
      summary: Get a single question group (includes questions)
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/QuestionGroup" }
    put:
      tags: [question-groups]
      summary: Update a question group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category_id: { type: integer }
                passage_id:  { type: integer }
                difficulty:  { type: string, enum: [easy, medium, hard] }
                context:     { $ref: "#/components/schemas/GroupContext" }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/QuestionGroup" }
    delete:
      tags: [question-groups]
      summary: Soft-delete a question group
      responses:
        "204": { description: Deleted }

  /banks/{bankId}/question-groups/{id}/restore:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: id     ; in: path ; required: true ; schema: { type: integer }
    put:
      tags: [question-groups]
      summary: Restore a soft-deleted question group
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/QuestionGroup" }

  # ── Questions ─────────────────────────────────────────────────────────────────

  /banks/{bankId}/questions:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [questions]
      summary: List questions in a bank
      parameters:
        - name: category_id
          in: query
          description: Filter by category (repeatable for multiple)
          schema: { type: integer }
        - name: difficulty
          in: query
          schema: { type: string, enum: [easy, medium, hard] }
        - name: type
          in: query
          schema:
            type: string
            enum: [mcq, tf_ng, yn_ng, matching_headings, matching_information,
                   matching_features, sentence_completion, form_completion, short_answer]
        - name: tag
          in: query
          description: Filter by tag (repeatable)
          schema: { type: string }
        - name: standalone
          in: query
          description: If true, return only questions without a group_id
          schema: { type: boolean }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Question" }
    post:
      tags: [questions]
      summary: Create a standalone question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [category_id, type, difficulty, content]
              properties:
                category_id: { type: integer }
                type:
                  type: string
                  enum: [mcq, tf_ng, yn_ng, sentence_completion, form_completion, short_answer]
                difficulty:  { type: string, enum: [easy, medium, hard] }
                tags:        { type: array, items: { type: string } }
                content:     { type: string, description: Question stem }
                answer:
                  type: string
                  description: Correct answer for non-MCQ types
                options:
                  type: array
                  items: { $ref: "#/components/schemas/MCQOption" }
                  description: MCQ only
                answers:
                  type: array
                  items: { type: string }
                  description: Correct option keys for MCQ (e.g. ["A"])
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Question" }

  /banks/{bankId}/questions/ingest:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
    post:
      tags: [questions]
      summary: Bulk-import questions from a file (JSON / YAML / CSV)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: All rows imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/IngestResult" }
        "422":
          description: Some rows failed validation
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IngestResult" }

  /banks/{bankId}/questions/{id}:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: id     ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [questions]
      summary: Get a single question
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Question" }
    put:
      tags: [questions]
      summary: Update a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category_id: { type: integer }
                difficulty:  { type: string, enum: [easy, medium, hard] }
                tags:        { type: array, items: { type: string } }
                content:     { type: string }
                answer:      { type: string }
                options:     { type: array, items: { $ref: "#/components/schemas/MCQOption" } }
                answers:     { type: array, items: { type: string } }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Question" }
    delete:
      tags: [questions]
      summary: Soft-delete a question
      responses:
        "204": { description: Deleted }

  /banks/{bankId}/questions/{id}/restore:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: id     ; in: path ; required: true ; schema: { type: integer }
    put:
      tags: [questions]
      summary: Restore a soft-deleted question
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Question" }

  # ── Tests ─────────────────────────────────────────────────────────────────────

  /banks/{bankId}/tests:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [tests]
      summary: List tests in a bank
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Test" }

  /banks/{bankId}/tests/generate:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
    post:
      tags: [tests]
      summary: Generate a new test from the bank's question pool
      description: |
        Uses the bank's `default_config` unless a `config` override is provided.
        Backfills easier questions when a difficulty bucket runs short.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:        { type: string }
                description: { type: string }
                config:      { $ref: "#/components/schemas/TestConfig" }
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Test" }

  /banks/{bankId}/tests/{id}:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: id     ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [tests]
      summary: Get a single test (includes ordered questions)
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Test" }
    delete:
      tags: [tests]
      summary: Soft-delete a test
      responses:
        "204": { description: Deleted }

  /banks/{bankId}/tests/{id}/restore:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: id     ; in: path ; required: true ; schema: { type: integer }
    put:
      tags: [tests]
      summary: Restore a soft-deleted test
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Test" }

  # ── Attempts ──────────────────────────────────────────────────────────────────

  /banks/{bankId}/tests/{id}/attempts:
    parameters:
      - name: bankId ; in: path ; required: true ; schema: { type: integer }
      - name: id     ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [attempts]
      summary: List attempts for a test
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/TestAttempt" }
    post:
      tags: [attempts]
      summary: Start a new attempt (no body required)
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/TestAttempt" }

  /attempts/{id}:
    parameters:
      - name: id ; in: path ; required: true ; schema: { type: integer }
    get:
      tags: [attempts]
      summary: Get an attempt (includes test + questions)
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/TestAttempt" }

  /attempts/{id}/submit:
    parameters:
      - name: id ; in: path ; required: true ; schema: { type: integer }
    put:
      tags: [attempts]
      summary: Submit answers and receive score
      description: |
        **Grading rules**

        - MCQ: submit pipe-separated option keys (`"A"` or `"A|C"`). Keys are
          sorted before comparison.
        - tf_ng / yn_ng: `"true"`, `"false"`, `"not given"` (case-insensitive).
        - sentence_completion / form_completion / short_answer: free text
          (case-insensitive exact match).
        - matching_headings / matching_information / matching_features: exact
          match on the option key.

        `short_answer` questions do **not** contribute to the automated score
        (score stays null for those items on the frontend).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: object
                  additionalProperties: { type: string }
                  description: |
                    Map of `"<question_id>"` → submitted answer string.
                  example:
                    "42": "A"
                    "43": "true"
                    "44": "not given"
      responses:
        "200":
          description: Graded attempt with score and total
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/TestAttempt" }
        "409":
          description: Attempt already completed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
